* { box-sizing: border-box; margin: 0; padding: 0; }

/* Scrollbar */

/* Animations */

  .slide-in { animation: slideIn 0.3s ease-out; }

<script>

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const today = () => new Date().toISOString().split('T')[0];
const now = () => new Date().toISOString();
const fmtCur = n => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = d => new Date(d).toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtDateTime = d => new Date(d).toLocaleString('es-CO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
const currentMonth = () => today().slice(0, 7);

// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const DB = {
  get(key) { try { return JSON.parse(localStorage.getItem('sw_' + key)) || []; } catch { return []; } },
  set(key, val) { localStorage.setItem('sw_' + key, JSON.stringify(val)); },
  remove(key) { localStorage.removeItem('sw_' + key); }
};

// ═══════════════════════════════════════════
// CRYPTO
// ═══════════════════════════════════════════
async function hashPassword(password, salt) {
  const enc = new TextEncoder();
  const data = enc.encode(salt + password);
  const hashBuf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function genSalt() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg, type = 'success') {
  const colors = {
    success: 'bg-emerald-50 border-emerald-300 text-emerald-800',
    error: 'bg-red-50 border-red-300 text-red-800',
    warning: 'bg-amber-50 border-amber-300 text-amber-800'
  };
  const icons = {
    success: 'fa-circle-check text-emerald-500',
    error: 'fa-circle-xmark text-red-500',
    warning: 'fa-triangle-exclamation text-amber-500'
  };
  const el = document.createElement('div');
  el.className = `toast border-l-4 ${colors[type]} px-4 py-3 rounded-xl shadow-lg flex items-start gap-3 text-sm`;
  el.innerHTML = `<i class="fa-solid ${icons[type]} mt-0.5"></i><span>${msg}</span>`;
  $('#toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(html, maxW = 'max-w-lg') {
  const mc = $('#modalContent');
  mc.className = `bg-white rounded-2xl shadow-2xl w-full ${maxW} max-h-[90vh] overflow-y-auto fade-in`;
  mc.innerHTML = html;
  $('#modalContainer').classList.remove('hidden');
}
function closeModal() { $('#modalContainer').classList.add('hidden'); }
$('#modalContainer').addEventListener('click', e => { if (e.target === $('#modalContainer')) closeModal(); });

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
function togglePassVis() {
  const p = $('#loginPass');
  const eye = $('#passEye');
  if (p.type === 'password') { p.type = 'text'; eye.className = 'fa-solid fa-eye-slash'; }
  else { p.type = 'password'; eye.className = 'fa-solid fa-eye'; }
}

async function doLogin() {
  const username = $('#loginUser').value.trim();
  const password = $('#loginPass').value;
  const errEl = $('#loginError');
  errEl.classList.add('hidden');
  if (!username || !password) { errEl.textContent = 'Completa todos los campos.'; errEl.classList.remove('hidden'); return; }
  const users = DB.get('users');
  const user = users.find(u => u.username === username);
  if (!user) { errEl.textContent = 'Usuario no encontrado.'; errEl.classList.remove('hidden'); return; }
  const hash = await hashPassword(password, user.salt);
  if (hash !== user.passwordHash) { errEl.textContent = 'Contraseña incorrecta.'; errEl.classList.remove('hidden'); return; }
  sessionStorage.setItem('sw_session', JSON.stringify({ userId: user.id, username: user.username }));
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('sw_session');
  $('#appShell').classList.add('hidden');
  $('#loginScreen').classList.remove('hidden');
  $('#loginUser').value = '';
  $('#loginPass').value = '';
}

$('#loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('#loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') $('#loginPass').focus(); });

function getSession() {
  try { return JSON.parse(sessionStorage.getItem('sw_session')); } catch { return null; }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const navItems = [
  { id: 'dashboard', icon: 'fa-chart-pie', label: 'Panel Principal' },
  { id: 'wallets', icon: 'fa-wallet', label: 'Billeteras' },
  { id: 'inventory', icon: 'fa-boxes-stacked', label: 'Inventario' },
  { id: 'compositions', icon: 'fa-puzzle-piece', label: 'Composiciones' },
  { id: 'buy-stock', icon: 'fa-cart-shopping', label: 'Comprar Stock' },
  { id: 'new-sale', icon: 'fa-cash-register', label: 'Nueva Venta' },
  { id: 'new-expense', icon: 'fa-receipt', label: 'Nuevo Gasto' },
  { id: 'history', icon: 'fa-clock-rotate-left', label: 'Historial' },
  { id: 'analytics', icon: 'fa-chart-line', label: 'Análisis' },
  { id: 'clients', icon: 'fa-address-book', label: 'Clientes' },
  { id: 'invoices', icon: 'fa-file-invoice', label: 'Facturas' },
  { id: 'settings', icon: 'fa-gear', label: 'Configuración' },
];

let currentPage = 'dashboard';
let charts = {};

function buildNav() {
  const nav = $('#sidebarNav');
  nav.innerHTML = navItems.map(n =>
    `<button class="nav-item w-full flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 ${currentPage === n.id ? 'active' : ''}" data-page="${n.id}">
      <i class="fa-solid ${n.icon} w-5 text-center"></i> ${n.label}
    </button>`
  ).join('');
  $$('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = btn.dataset.page;
      buildNav();
      renderPage();
      updateHeader();
      if (window.innerWidth < 1024) toggleSidebar();
    });
  });
}

function updateHeader() {
  const item = navItems.find(n => n.id === currentPage);
  $('#pageTitle').textContent = item ? item.label : '';
  updateBalance();
}

function updateBalance() {
  const wallets = DB.get('wallets');
  const total = wallets.reduce((s, w) => s + w.balance, 0);
  $('#headerBalanceAmt').textContent = fmtCur(total);
}

function toggleSidebar() {
  const sb = $('#sidebar');
  const ov = $('#sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('active');
}

// ═══════════════════════════════════════════
// PWA INSTALL
// ═══════════════════════════════════════════
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const dismissed = localStorage.getItem('sw_installDismissed');
  if (!dismissed) {
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'flex';
  }
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((choiceResult) => {
    if (choiceResult.outcome === 'accepted') showToast('App instalada correctamente');
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
}

function dismissInstall() {
  document.getElementById('installBanner').style.display = 'none';
  localStorage.setItem('sw_installDismissed', 'true');
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'cw-v2';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          if (resp.ok && e.request.url.startsWith('http')) {
            const clone = resp.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return resp;
        }).catch(() => new Response('Offline', { status: 503 })))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

function renderPage() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  const content = $('#mainContent');
  switch (currentPage) {
    case 'dashboard': renderDashboard(content); break;
    case 'wallets': renderWallets(content); break;
    case 'inventory': renderInventory(content); break;
    case 'compositions': renderCompositions(content); break;
    case 'buy-stock': renderBuyStock(content); break;
    case 'new-sale': renderNewSale(content); break;
    case 'new-expense': renderNewExpense(content); break;
    case 'history': renderHistory(content); break;
    case 'clients': renderClients(content); break;
    case 'invoices': renderInvoices(content); break;
    case 'analytics': renderAnalytics(content); break;
    case 'settings': renderSettings(content); break;
  }
}

function buildDashChart() {
  const labels = [];
  const salesData = [];
  const expData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    labels.push(d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }));
    const daySales = DB.get('sales').filter(s => s.date.startsWith(ds)).reduce((sum, s) => sum + s.total, 0);
    const dayExp = DB.get('expenses').filter(e => e.date.startsWith(ds)).reduce((sum, e) => sum + e.amount, 0);
    salesData.push(daySales);
    expData.push(dayExp);
  }
  const ctx = document.getElementById('dashChart');
  if (!ctx) return;
  charts['dash'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Ventas', data: salesData, backgroundColor: 'rgba(16,185,129,0.7)', borderRadius: 8 },
        { label: 'Gastos', data: expData, backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 8 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle' } } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v } }, x: { grid: { display: false } } }
    }
  });
}

          ${ops.length === 0 ? '<p class="text-sm text-muted text-center py-4">Sin operaciones</p>' :

              </tr></thead>
              <tbody>${ops.map(o => {
                const w = wallets.find(x => x.id === o.walletId || o.fromWalletId || o.toWalletId);
                const label = o.type === 'recharge' ? 'Recarga' : 'Transferencia';
                const detail = o.type === 'recharge' ? (w ? w.name : '') : `${wallets.find(x => x.id === o.fromWalletId)?.name || ''} → ${wallets.find(x => x.id === o.toWalletId)?.name || ''}`;

      </div>
    </div>`;
}

  openModal(`

            ${wallets.map(w => `<option value="${w.id}">${w.name} (${fmtCur(w.balance)})</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Hacia</label>
          <select id="mTransferTo" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">

        </div>

          <input id="mTransferAmount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="closeModal()" class="btn flex-1 justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Cancelar</button>
          <button onclick="doTransfer()" class="btn flex-1 justify-center py-2.5 text-sm bg-purple-600 text-white hover:bg-purple-700"><i class="fa-solid fa-right-left"></i> Transferir</button>
        </div>
      </div>
    </div>`);
}

function doTransfer() {
  const fromId = $('#mTransferFrom').value;
  const toId = $('#mTransferTo').value;
  const amount = parseFloat($('#mTransferAmount').value);
  if (!amount || amount <= 0) { showToast('Ingresa un monto válido', 'warning'); return; }
  if (fromId === toId) { showToast('Selecciona billeteras diferentes', 'warning'); return; }
  const wallets = DB.get('wallets');
  const from = wallets.find(w => w.id === fromId);
  const to = wallets.find(w => w.id === toId);
  if (from.balance < amount) { showToast('Saldo insuficiente en ' + from.name, 'error'); return; }
  from.balance -= amount;
  to.balance += amount;
  DB.set('wallets', wallets);
  const ops = DB.get('walletOps');
  ops.push({ id: genId(), type: 'transfer', fromWalletId: fromId, toWalletId: toId, amount, date: now() });
  DB.set('walletOps', ops);
  closeModal();
  showToast('Transferencia exitosa: ' + fmtCur(amount));
  renderPage(); updateBalance();
}

let invTab = 'simple';
let invSearch = '';

function renderInventory(el) {
  const products = DB.get('products');
  const compositions = DB.get('compositions');
  const filtered = products.filter(p => {
    const matchTab = invTab === 'simple' ? p.type === 'simple' : p.type === 'insumo';
    const matchSearch = !invSearch || p.name.toLowerCase().includes(invSearch.toLowerCase()) || p.sku.toLowerCase().includes(invSearch.toLowerCase());

  });

  el.innerHTML = `
    <div class="space-y-6">
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <h2 class="font-heading font-semibold text-lg text-gray-900">Inventario</h2>
          <p class="text-sm text-muted">${products.length} producto(s) total</p>
        </div>
        <button onclick="openProductModal()" class="btn bg-accent text-white px-4 py-2.5 text-sm hover:bg-accent-dark"><i class="fa-solid fa-plus"></i> Nuevo Producto</button>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-gray-200">
        <button class="tab-btn ${invTab === 'simple' ? 'active' : ''} text-sm" onclick="invTab='simple';renderPage()">Productos Vendibles (${products.filter(p => p.type === 'simple').length})</button>
        <button class="tab-btn ${invTab === 'insumo' ? 'active' : ''} text-sm" onclick="invTab='insumo';renderPage()">Insumos (${products.filter(p => p.type === 'insumo').length})</button>
      </div>

      <!-- Search -->
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" placeholder="Buscar por nombre o SKU..." value="${invSearch}" oninput="invSearch=this.value;renderPage()" class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm bg-white">
      </div>

      <!-- Table -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="bg-gray-50 text-left text-muted">
              <th class="px-4 py-3 font-medium">Nombre</th>
              <th class="px-4 py-3 font-medium">SKU</th>
              <th class="px-4 py-3 font-medium">Costo</th>
              ${invTab === 'simple' ? '<th class="px-4 py-3 font-medium">Precio Venta</th><th class="px-4 py-3 font-medium">Margen</th>' : ''}
              <th class="px-4 py-3 font-medium">Stock</th>
              <th class="px-4 py-3 font-medium">Mín</th>
              <th class="px-4 py-3 font-medium">Acciones</th>
            </tr></thead>
            <tbody>
              ${filtered.length === 0 ? `<tr><td colspan="7" class="px-4 py-8 text-center text-muted">Sin productos</td></tr>` :
                filtered.map(p => {
                  const compCount = compositions.filter(c => c.parentId === p.id).length;
                  const isLow = p.stock <= p.lowStockThreshold;
                  const margin = p.sellingPrice > 0 ? ((p.sellingPrice - p.costPrice) / p.sellingPrice * 100).toFixed(0) : 0;
                  return `<tr class="border-t border-gray-50 hover:bg-gray-50">
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-2">
                        <span class="font-medium text-gray-900">${p.name}</span>
                        <span class="badge ${p.type === 'simple' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}">${p.type === 'simple' ? 'Producto' : 'Insumo'}</span>
                        ${compCount > 0 ? '<span class="badge bg-purple-100 text-purple-700">Compuesto</span>' : ''}
                      </div>
                    </td>
                    <td class="px-4 py-3 text-muted">${p.sku}</td>
                    <td class="px-4 py-3">${fmtCur(p.costPrice)}</td>
                    ${invTab === 'simple' ? `<td class="px-4 py-3">${fmtCur(p.sellingPrice)}</td><td class="px-4 py-3"><span class="text-emerald-600 font-medium">${margin}%</span></td>` : ''}
                    <td class="px-4 py-3"><span class="font-semibold ${isLow ? 'text-red-600' : 'text-gray-900'}">${p.stock}</span></td>
                    <td class="px-4 py-3 text-muted">${p.lowStockThreshold}</td>
                    <td class="px-4 py-3">
                      <div class="flex gap-1">
                        <button onclick="openProductModal('${p.id}')" class="w-8 h-8 rounded-lg bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 text-xs"><i class="fa-solid fa-pen"></i></button>

                      </div>

                }).join('')}

        </div>
      </div>
    </div>`;

          <p class="text-xs text-muted mt-1">Se mostrará alerta cuando el stock sea igual o menor a este valor</p>

function saveProduct(editId) {
  const type = $('#mProdType').value;
  const name = $('#mProdName').value.trim();
  const sku = $('#mProdSku').value.trim();
  const costPrice = parseFloat($('#mProdCost').value) || 0;
  const sellingPrice = parseFloat($('#mProdSell').value) || 0;
  const stock = parseInt($('#mProdStock').value) || 0;
  const lowStockThreshold = parseInt($('#mProdThreshold').value) || 10;

  if (!name) { showToast('Ingresa un nombre', 'warning'); return; }
  if (!sku) { showToast('Ingresa un SKU', 'warning'); return; }

  const products = DB.get('products');

  // Check unique SKU
  const existingSku = products.find(p => p.sku === sku && p.id !== editId);
  if (existingSku) { showToast('SKU ya existe', 'error'); return; }

  if (editId) {
    const p = products.find(x => x.id === editId);
    if (p) { Object.assign(p, { type, name, sku, costPrice, sellingPrice, stock, lowStockThreshold }); }
  } else {
    products.push({ id: genId(), type, name, sku, costPrice, sellingPrice, stock, lowStockThreshold, createdAt: now() });
  }
  DB.set('products', products);
  closeModal();
  showToast(editId ? 'Producto actualizado' : 'Producto creado');
  renderPage();
}

function deleteProduct(id) {
  const products = DB.get('products');
  const p = products.find(x => x.id === id);
  if (!p) return;
  // Check if product is used in compositions as component
  const comps = DB.get('compositions');
  const usedAsComp = comps.find(c => c.componentId === id);
  if (usedAsComp) { showToast('Este producto es componente de otro y no se puede eliminar', 'error'); return; }
  openModal(`
    <div class="p-6 text-center">
      <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-trash text-2xl text-red-500"></i></div>
      <h3 class="font-heading font-semibold text-lg mb-2">Eliminar Producto</h3>
      <p class="text-sm text-muted mb-6">¿Eliminar <strong>${p.name}</strong>?</p>
      <div class="flex gap-2">
        <button onclick="closeModal()" class="btn flex-1 justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Cancelar</button>

function confirmDeleteProduct(id) {
  let products = DB.get('products').filter(p => p.id !== id);

  let comps = DB.get('compositions').filter(c => c.parentId !== id);
  DB.set('compositions', comps);
  closeModal();
  showToast('Producto eliminado');
  renderPage();
}

function openAddCompModal(parentId) {
  const products = DB.get('products');
  const comps = DB.get('compositions');
  const existingCompIds = comps.filter(c => c.parentId === parentId).map(c => c.componentId);
  const availableInsumos = products.filter(p => p.type === 'insumo' && !existingCompIds.includes(p.id));

  if (availableInsumos.length === 0) { showToast('No hay insumos disponibles para agregar', 'warning'); return; }

  openModal(`
    <div class="p-6">
      <h3 class="font-heading font-semibold text-lg mb-4">Agregar Componente</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Insumo</label>
          <select id="mCompInsumo" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">
            ${availableInsumos.map(i => `<option value="${i.id}">${i.name} (${i.sku}) — Stock: ${i.stock} — ${fmtCur(i.costPrice)}/u</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad por unidad</label>
          <input id="mCompQty" type="number" min="1" value="1" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm">
          <p class="text-xs text-muted mt-1">¿Cuántas unidades de este insumo se necesitan por 1 unidad del producto?</p>
        </div>
        <div class="flex gap-2 pt-2">
          <button onclick="closeModal()" class="btn flex-1 justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Cancelar</button>
          <button onclick="addComp('${parentId}')" class="btn flex-1 justify-center py-2.5 text-sm bg-accent text-white hover:bg-accent-dark">Agregar</button>
        </div>
      </div>
    </div>`);
}

function addComp(parentId) {
  const componentId = $('#mCompInsumo').value;
  const quantity = parseInt($('#mCompQty').value) || 0;
  if (!componentId || quantity <= 0) { showToast('Datos inválidos', 'warning'); return; }
  const comps = DB.get('compositions');
  comps.push({ id: genId(), parentId, componentId, quantity });
  DB.set('compositions', comps);
  closeModal();
  showToast('Componente agregado');
  renderPage();
}

function removeComp(compId) {
  let comps = DB.get('compositions').filter(c => c.id !== compId);
  DB.set('compositions', comps);
  showToast('Componente eliminado');
  renderPage();
}

function onBuyProductChange() {
  const sel = $('#buyProduct');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.cost) {
    $('#buyUnitCost').value = opt.dataset.cost;
    onBuyQtyChange();
  }
}

function onBuyQtyChange() {
  const qty = parseFloat($('#buyQty').value) || 0;
  const cost = parseFloat($('#buyUnitCost').value) || 0;
  $('#buyTotal').textContent = fmtCur(qty * cost);
}

function doBuyStock() {
  const productId = $('#buyProduct').value;
  const qty = parseInt($('#buyQty').value) || 0;
  const unitCost = parseFloat($('#buyUnitCost').value) || 0;
  const walletId = $('#buyWallet').value;

  if (!productId) { showToast('Selecciona un producto', 'warning'); return; }
  if (qty <= 0) { showToast('Ingresa una cantidad válida', 'warning'); return; }
  if (unitCost <= 0) { showToast('Ingresa un costo unitario válido', 'warning'); return; }
  if (!walletId) { showToast('Selecciona una billetera', 'warning'); return; }

  const totalCost = qty * unitCost;
  const wallets = DB.get('wallets');
  const wallet = wallets.find(w => w.id === walletId);
  if (!wallet || wallet.balance < totalCost) { showToast('Saldo insuficiente en la billetera', 'error'); return; }

  const products = DB.get('products');
  const product = products.find(p => p.id === productId);
  if (!product) return;

  wallet.balance -= totalCost;
  product.stock += qty;
  DB.set('wallets', wallets);
  DB.set('products', products);

  const purchases = DB.get('purchases');
  purchases.push({ id: genId(), productId, productName: product.name, quantity: qty, unitCost, totalCost, walletId, date: now() });
  DB.set('purchases', purchases);

  showToast(`Compra exitosa: +${qty} ${product.name}`);
  renderPage(); updateBalance();
}

                return `<button onclick="completeSaleAndWhatsApp()" class="btn w-full justify-center py-3 text-sm ${saleCart.length === 0 || !saleWallet ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'text-white hover:opacity-90'}" style="${saleCart.length > 0 && saleWallet ? 'background:#25D366;' : ''}" ${saleCart.length === 0 || !saleWallet ? 'disabled' : ''}>

                </button>`;

                const cl = saleClientId ? DB.get('clients').find(c => c.id === saleClientId) : null;

}

function addToCart(productId) {
  const products = DB.get('products');
  const p = products.find(x => x.id === productId);
  if (!p) return;
  const existing = saleCart.find(i => i.productId === productId);
  if (existing) { existing.qty++; }
  else { saleCart.push({ productId, productName: p.name, productSku: p.sku, costPrice: p.costPrice, sellingPrice: p.sellingPrice, qty: 1 }); }
  renderPage();
}

function removeFromCart(idx) {
  saleCart.splice(idx, 1);
  renderPage();
}

function updateCartItem(idx, field, value) {
  saleCart[idx][field] = parseFloat(value) || 0;
  if (saleCart[idx].qty <= 0) saleCart[idx].qty = 1;
  renderPage();
}

function completeSale() {
  const walletId = $('#saleWallet') ? $('#saleWallet').value : '';
  if (saleCart.length === 0) { showToast('El carrito está vacío', 'warning'); return; }
  if (!walletId) { showToast('Selecciona una billetera destino', 'warning'); return; }

  const products = DB.get('products');
  const comps = DB.get('compositions');

  // Validate stock
  const errors = [];
  for (const item of saleCart) {
    const product = products.find(p => p.id === item.productId);
    if (!product) continue;
    if (product.stock < item.qty) {
      errors.push(`Stock insuficiente de "${product.name}". Requerido: ${item.qty}, Disponible: ${product.stock}`);
      continue;
    }
    // Check component stock for complex products
    const itemComps = comps.filter(c => c.parentId === item.productId);
    for (const comp of itemComps) {
      const compProduct = products.find(p => p.id === comp.componentId);
      if (!compProduct) continue;
      const needed = comp.quantity * item.qty;
      if (compProduct.stock < needed) {
        errors.push(`No hay suficiente stock de "${compProduct.name}" (insumo). Requerido: ${needed}, Disponible: ${compProduct.stock}`);
      }
    }
  }

  if (errors.length > 0) {
    openModal(`
      <div class="p-6">
        <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-2xl text-red-500"></i></div>
        <h3 class="font-heading font-semibold text-lg mb-3 text-center">Error de Stock</h3>
        <div class="space-y-2 max-h-60 overflow-y-auto mb-4">
          ${errors.map(e => `<p class="text-sm text-red-700 bg-red-50 p-3 rounded-lg">${e}</p>`).join('')}
        </div>
        <button onclick="closeModal()" class="btn w-full justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Entendido</button>
      </div>`);
    return;
  }

  // Process sale
  const wallets = DB.get('wallets');
  const wallet = wallets.find(w => w.id === walletId);
  const total = saleCart.reduce((s, i) => s + i.sellingPrice * i.qty, 0);
  const totalCost = saleCart.reduce((s, i) => s + i.costPrice * i.qty, 0);

  wallet.balance += total;
  DB.set('wallets', wallets);

  // Deduct stock
  for (const item of saleCart) {
    const product = products.find(p => p.id === item.productId);
    if (product) product.stock -= item.qty;

    // Deduct component stock
    const itemComps = comps.filter(c => c.parentId === item.productId);
    for (const comp of itemComps) {
      const compProduct = products.find(p => p.id === comp.componentId);
      if (compProduct) compProduct.stock -= comp.quantity * item.qty;
    }
  }
  DB.set('products', products);

  // Increment sale counter
  let saleCounter = parseInt(localStorage.getItem('sw_saleCounter')) || 0;
  saleCounter++;
  localStorage.setItem('sw_saleCounter', saleCounter.toString());
  const saleNumber = 'V-' + saleCounter.toString().padStart(5, '0');

  // Get client info
  const selectedClientId = $('#saleClientSelect') ? $('#saleClientSelect').value : '';
  const clients = DB.get('clients');
  const selectedClient = selectedClientId ? clients.find(c => c.id === selectedClientId) : null;
  const customerName = selectedClient ? selectedClient.name : (saleCustomerName.trim() || 'Cliente General');
  const customerDoc = selectedClient ? selectedClient.doc : (saleCustomerDoc.trim() || '');

  // Create sale record
  const sales = DB.get('sales');
  const saleId = genId();
  sales.push({
    id: saleId,
    saleNumber,
    clientId: selectedClientId || null,
    customerName,
    customerDoc,
    clientPhone: selectedClient ? (selectedClient.phone || null) : null,
    invoiceNumber: null,
    items: saleCart.map(i => ({ productId: i.productId, productName: i.productName, productSku: i.productSku, costPrice: i.costPrice, sellingPrice: i.sellingPrice, qty: i.qty })),
    total, totalCost, walletId, date: now()
  });
  DB.set('sales', sales);

  lastCompletedSaleId = saleId;
  showToast(`Venta completada: ${fmtCur(total)} · Ganancia: ${fmtCur(total - totalCost)}`);
  saleCart = [];
  saleWallet = '';
  saleCustomerName = '';
  saleCustomerDoc = '';
  saleClientId = '';

  // Check if client has phone for WhatsApp
  const hasClientPhone = !!(selectedClientId && selectedClient && selectedClient.phone);

  // Show success modal with invoice and WhatsApp options
  openModal(`
    <div class="p-6 text-center">
      <div class="w-16 h-16 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-circle-check text-3xl text-emerald-500"></i></div>
      <h3 class="font-heading font-semibold text-lg mb-2">Venta Exitosa</h3>
      <p class="text-sm text-muted mb-1">Total: <strong>${fmtCur(total)}</strong></p>
      <p class="text-sm text-muted mb-1">Ganancia: <strong class="text-emerald-600">${fmtCur(total - totalCost)}</strong></p>
      ${customerName !== 'Cliente General' ? `<p class="text-sm text-muted mb-4">Cliente: <strong>${customerName}</strong></p>` : '<p class="text-sm text-muted mb-4">&nbsp;</p>'}
      <div class="space-y-2">
        <button onclick="closeModal();generateInvoice('${saleId}')" class="btn w-full justify-center py-2.5 text-sm bg-accent text-white hover:bg-accent-dark"><i class="fa-solid fa-file-invoice"></i> Generar Factura</button>
        ${hasClientPhone ? `<button onclick="closeModal();sendInvoiceWhatsApp('${saleId}')" class="btn w-full justify-center py-2.5 text-sm text-white hover:opacity-90" style="background:#25D366;"><i class="fa-brands fa-whatsapp"></i> Enviar Factura por WhatsApp</button>` : ''}
        <button onclick="closeModal()" class="btn w-full justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Cerrar</button>
      </div>
    </div>`, 'max-w-sm');

  renderPage(); updateBalance();
}

  const category = $('#expCategory').value;

  const amount = parseFloat($('#expAmount').value) || 0;

  if (!description) { showToast('Ingresa una descripción', 'warning'); return; }
  if (amount <= 0) { showToast('Ingresa un monto válido', 'warning'); return; }
  if (!walletId) { showToast('Selecciona una billetera', 'warning'); return; }

  const wallets = DB.get('wallets');
  const wallet = wallets.find(w => w.id === walletId);
  if (!wallet || wallet.balance < amount) { showToast('Saldo insuficiente', 'error'); return; }

  DB.set('expenses', expenses);

function getBusinessSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('sw_businessSettings')) || {};
    return { name: 'CoffeeWallet', nit: '', address: '', phone: '', email: '', resolution: '', inactiveAlertDays: 15, ...s };
  } catch { return { name: 'CoffeeWallet', nit: '', address: '', phone: '', email: '', resolution: '', inactiveAlertDays: 15 }; }
}

function getInactiveAlertDays() {
  return getBusinessSettings().inactiveAlertDays || 15;
}

function getNextInvoiceNumber() {
  let counter = parseInt(localStorage.getItem('sw_invoiceCounter')) || 0;
  counter++;
  localStorage.setItem('sw_invoiceCounter', counter.toString());
  return counter.toString().padStart(6, '0');
}

function formatPhoneWA(phone) {
  if (!phone) return null;
  let cleaned = phone.replace(/[\s\-\(\)\.]/g, '');
  // Remove leading 57 if already has country code
  if (cleaned.startsWith('+57')) cleaned = cleaned.substring(3);
  else if (cleaned.startsWith('0057')) cleaned = cleaned.substring(4);
  else if (cleaned.startsWith('57') && cleaned.length === 12) cleaned = cleaned.substring(2);
  // Ensure starts with country code for Colombia
  if (cleaned.length === 10 && cleaned.startsWith('3')) return '57' + cleaned;
  if (cleaned.length === 12 && cleaned.startsWith('57')) return cleaned;
  return null; // Invalid phone format
}

function buildInvoiceText(sale) {
  const biz = getBusinessSettings();
  const items = sale.items || [];
  const itemsText = items.map((item, idx) =>
    `${idx + 1}. ${item.productName} x${item.qty} — ${fmtCur(item.sellingPrice * item.qty)}`
  ).join('\n');

  let text = `🧾 *FACTURA #${sale.invoiceNumber || 'S/N'}*\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `🏪 *${biz.name || 'CoffeeWallet'}*\n`;
  if (biz.nit) text += `NIT: ${biz.nit}\n`;
  if (biz.address) text += `📍 ${biz.address}\n`;
  if (biz.phone) text += `📞 ${biz.phone}\n`;
  if (biz.resolution) text += `📄 Resolución: ${biz.resolution}\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  if (sale.saleNumber) text += `🔢 Venta: ${sale.saleNumber}\n`;
  const saleDate = new Date(sale.date);
  text += `📅 Fecha: ${saleDate.toLocaleDateString('es-CO', { day: '2-digit', month: 'long', year: 'numeric' })}\n`;
  text += `🕐 Hora: ${saleDate.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })}\n\n`;
  text += `👤 *Cliente:* ${sale.customerName || 'Cliente General'}\n`;
  if (sale.customerDoc) text += `🪪 Doc: ${sale.customerDoc}\n`;
  text += `\n📦 *DETALLE:*\n${itemsText}\n\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `💰 *TOTAL: ${fmtCur(sale.total)}*\n`;
  text += `━━━━━━━━━━━━━━━━━━━━\n\n`;
  text += `✅ ¡Gracias por su compra!\n`;
  return text;
}

function getClientPhoneForSale(sale) {
  if (sale.clientId) {
    const client = DB.get('clients').find(c => c.id === sale.clientId);
    if (client && client.phone) return client.phone;
  }
  // Fallback: check if there's a phone saved in the sale record
  return sale.clientPhone || null;
}

function sendInvoiceWhatsApp(saleId) {
  const sale = DB.get('sales').find(s => s.id === saleId);
  if (!sale) { showToast('Venta no encontrada', 'error'); return; }

  // Ensure invoice number exists
  if (!sale.invoiceNumber) {
    sale.invoiceNumber = getNextInvoiceNumber();
    const sales = DB.get('sales');
    const idx = sales.findIndex(s => s.id === saleId);
    if (idx >= 0) { sales[idx] = sale; DB.set('sales', sales); }
  }

  const phone = getClientPhoneForSale(sale);
  if (!phone) {
    showToast('El cliente no tiene teléfono registrado', 'warning');
    return;
  }

  const formatted = formatPhoneWA(phone);
  if (!formatted) {
    showToast('Formato de teléfono inválido: ' + phone, 'warning');
    return;
  }

  const text = buildInvoiceText(sale);
  const url = `https://wa.me/${formatted}?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
  showToast('Abriendo WhatsApp...', 'success');
}

function sendClientWhatsApp(clientId, customMessage) {
  const client = DB.get('clients').find(c => c.id === clientId);
  if (!client) { showToast('Cliente no encontrado', 'error'); return; }
  if (!client.phone) { showToast('El cliente no tiene teléfono registrado', 'warning'); return; }

  const formatted = formatPhoneWA(client.phone);
  if (!formatted) { showToast('Formato de teléfono inválido', 'warning'); return; }

  const message = customMessage || `Hola ${client.name}, le contactamos de ${getBusinessSettings().name || 'CoffeeWallet'}. 🙌`;
  const url = `https://wa.me/${formatted}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
  showToast('Abriendo WhatsApp...', 'success');
}

function sendClientInvoiceWhatsApp(clientId) {
  // Find the last sale for this client with an invoice
  const sales = DB.get('sales').filter(s => s.clientId === clientId && s.invoiceNumber);
  if (sales.length === 0) { showToast('Este cliente no tiene facturas generadas', 'warning'); return; }
  // Get the most recent invoice
  sales.sort((a, b) => b.date.localeCompare(a.date));
  sendInvoiceWhatsApp(sales[0].id);
}

function contactInactiveClient(clientId, daysSince) {
  const client = DB.get('clients').find(c => c.id === clientId);
  if (!client || !client.phone) { showToast('Cliente no tiene teléfono', 'warning'); return; }

  const formatted = formatPhoneWA(client.phone);
  if (!formatted) { showToast('Formato de teléfono inválido', 'warning'); return; }

  const biz = getBusinessSettings();
  const message = `Hola ${client.name}, le escribe ${biz.name || 'CoffeeWallet'}. ☕\n\n` +
    `Notamos que hace ${daysSince} días no realiza una compra con nosotros y queríamos saber cómo está. 🤗\n\n` +

    `¡Esperamos volver a verle pronto! 🙌`;

  const url = `https://wa.me/${formatted}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
  showToast('Abriendo WhatsApp...', 'success');
}

let clientSearch = '';

function renderClients(el) {
  const clients = DB.get('clients');
  const sales = DB.get('sales');
  const filtered = clients.filter(c => !clientSearch || c.name.toLowerCase().includes(clientSearch.toLowerCase()) || (c.doc && c.doc.toLowerCase().includes(clientSearch.toLowerCase())) || (c.phone && c.phone.includes(clientSearch)));

  // Compute stats per client
  const clientStats = {};
  clients.forEach(c => { clientStats[c.id] = { totalPurchases: 0, totalSpent: 0, lastPurchase: null }; });
  sales.forEach(s => {
    if (s.clientId && clientStats[s.clientId]) {
      clientStats[s.clientId].totalPurchases++;
      clientStats[s.clientId].totalSpent += s.total;
      if (!clientStats[s.clientId].lastPurchase || s.date > clientStats[s.clientId].lastPurchase) {
        clientStats[s.clientId].lastPurchase = s.date;
      }
    }
  });

  // Find inactive clients (configurable threshold, must have at least 1 purchase)
  const inactiveDaysThreshold = getInactiveAlertDays();
  const inactiveCutoff = new Date();
  inactiveCutoff.setDate(inactiveCutoff.getDate() - inactiveDaysThreshold);
  const inactiveClients = clients.filter(c => {
    const stats = clientStats[c.id];
    if (!stats || stats.totalPurchases === 0 || !stats.lastPurchase) return false;
    return new Date(stats.lastPurchase) < inactiveCutoff;
  }).sort((a, b) => {
    const dateA = clientStats[a.id]?.lastPurchase || '';
    const dateB = clientStats[b.id]?.lastPurchase || '';
    return dateA.localeCompare(dateB);
  });

  const totalClients = clients.length;
  const activeClients = Object.values(clientStats).filter(s => s.totalPurchases > 0).length;
  const totalRevenue = Object.values(clientStats).reduce((sum, s) => sum + s.totalSpent, 0);

  el.innerHTML = `

function saveClient(editId) {
  const name = $('#mCliName').value.trim();
  const doc = $('#mCliDoc').value.trim();
  const phone = $('#mCliPhone').value.trim();
  const email = $('#mCliEmail').value.trim();
  const address = $('#mCliAddress').value.trim();
  const notes = $('#mCliNotes').value.trim();

  if (!name) { showToast('Ingresa un nombre', 'warning'); return; }

  const clients = DB.get('clients');

  if (editId) {
    const c = clients.find(x => x.id === editId);
    if (c) { Object.assign(c, { name, doc, phone, email, address, notes }); }
  } else {
    clients.push({ id: genId(), name, doc, phone, email, address, notes, createdAt: now() });
  }
  DB.set('clients', clients);
  closeModal();
  showToast(editId ? 'Cliente actualizado' : 'Cliente registrado');
  renderPage();
}

function renderAnalytics(el) {
  const sales = DB.get('sales');
  const expenses = DB.get('expenses');
  const cm = currentMonth();
  const pm = (() => { const d = new Date(); d.setMonth(d.getMonth() - 1); return d.toISOString().slice(0, 7); })();

  const cmSales = sales.filter(s => s.date.startsWith(cm));
  const pmSales = sales.filter(s => s.date.startsWith(pm));
  const cmExp = expenses.filter(e => e.date.startsWith(cm));
  const pmExp = expenses.filter(e => e.date.startsWith(pm));

  const cmRevenue = cmSales.reduce((s, x) => s + x.total, 0);
  const pmRevenue = pmSales.reduce((s, x) => s + x.total, 0);
  const cmProfit = cmSales.reduce((s, x) => s + x.total - x.totalCost, 0);
  const pmProfit = pmSales.reduce((s, x) => s + x.total - x.totalCost, 0);
  const cmExpTotal = cmExp.reduce((s, x) => s + x.amount, 0);
  const pmExpTotal = pmExp.reduce((s, x) => s + x.amount, 0);
  const cmTxCount = cmSales.length + cmExp.length;

  const pctChange = (curr, prev) => {
    if (prev === 0) return curr > 0 ? 100 : 0;
    return ((curr - prev) / prev * 100).toFixed(1);
  };

  const kpis = [

function buildAnalyticsCharts() {
  const sales = DB.get('sales');
  const expenses = DB.get('expenses');

  // 1. 30-day trend
  {
    const labels = [], salesData = [], profitData = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      labels.push(d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }));
      const daySales = sales.filter(s => s.date.startsWith(ds));
      const dayRev = daySales.reduce((s, x) => s + x.total, 0);
      const dayProfit = daySales.reduce((s, x) => s + x.total - x.totalCost, 0);
      salesData.push(dayRev);
      profitData.push(dayProfit);
    }
    const ctx = document.getElementById('analyticsTrend');
    if (ctx) charts['trend'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Ventas', data: salesData, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4, pointRadius: 0 },
          { label: 'Ganancia', data: profitData, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', fill: true, tension: 0.4, pointRadius: 0 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } }, scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v } }, x: { display: false } } }
    });
  }

  // 2. Expense categories
  {
    const catTotals = {};
    expenses.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
    const labels = Object.keys(catTotals);
    const data = Object.values(catTotals);
    const colors = ['#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#10b981', '#6b7280'];
    const ctx = document.getElementById('analyticsCat');
    if (ctx) charts['cat'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: labels.map(l => { const c = expenseCategories.find(x => x.value === l); return c ? c.label : l; }),
        datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } } }
    });
  }

  // 3. Top products
  {
    const prodRev = {};
    sales.forEach(s => {
      s.items.forEach(i => { prodRev[i.productId] = (prodRev[i.productId] || 0) + i.sellingPrice * i.qty; });
    });
    const sorted = Object.entries(prodRev).sort((a, b) => b[1] - a[1]).slice(0, 8);
    const products = DB.get('products');
    const labels = sorted.map(([id]) => { const p = products.find(x => x.id === id); return p ? p.name : id; });
    const data = sorted.map(([, v]) => v);
    const ctx = document.getElementById('analyticsTop');
    if (ctx) charts['top'] = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data, backgroundColor: 'rgba(245,158,11,0.7)', borderRadius: 8 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { callback: v => '$' + v } } } }
    });
  }

  // 4. Daily net balance (last 14 days)
  {
    const labels = [], data = [], bgColors = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      labels.push(d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }));
      const dayRev = sales.filter(s => s.date.startsWith(ds)).reduce((s, x) => s + x.total, 0);
      const dayExp = expenses.filter(e => e.date.startsWith(ds)).reduce((s, x) => s + x.amount, 0);
      const net = dayRev - dayExp;
      data.push(net);
      bgColors.push(net >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(239,68,68,0.7)');
    }
    const ctx = document.getElementById('analyticsDaily');
    if (ctx) charts['daily'] = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Balance Neto', data, backgroundColor: bgColors, borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '$' + v } }, x: { grid: { display: false } } } }
    });
  }
}

function saveBusinessSettings() {

    nit: $('#bizNit').value.trim(),
    address: $('#bizAddress').value.trim(),
    phone: $('#bizPhone').value.trim(),
    email: $('#bizEmail').value.trim(),
    resolution: $('#bizResolution').value.trim(),
    inactiveAlertDays: Math.max(1, Math.min(365, inactiveDays))
  };
  localStorage.setItem('sw_businessSettings', JSON.stringify(settings));
  showToast('Datos del negocio guardados correctamente');
  renderPage();
}

async function changePassword() {
  const currPass = $('#setCurrPass').value;
  const newPass = $('#setNewPass').value;
  const confPass = $('#setConfPass').value;
  const errEl = $('#setPassError');
  errEl.classList.add('hidden');

  if (!currPass || !newPass || !confPass) { errEl.textContent = 'Completa todos los campos.'; errEl.classList.remove('hidden'); return; }
  if (newPass.length < 4) { errEl.textContent = 'La contraseña debe tener al menos 4 caracteres.'; errEl.classList.remove('hidden'); return; }
  if (newPass !== confPass) { errEl.textContent = 'Las contraseñas no coinciden.'; errEl.classList.remove('hidden'); return; }

  const session = getSession();
  const users = DB.get('users');
  const user = users.find(u => u.id === session.userId);
  if (!user) return;

  const hash = await hashPassword(currPass, user.salt);
  if (hash !== user.passwordHash) { errEl.textContent = 'Contraseña actual incorrecta.'; errEl.classList.remove('hidden'); return; }

  const newSalt = genSalt();
  const newHash = await hashPassword(newPass, newSalt);
  user.salt = newSalt;
  user.passwordHash = newHash;
  DB.set('users', users);

  showToast('Contraseña actualizada correctamente');
  $('#setCurrPass').value = '';
  $('#setNewPass').value = '';
  $('#setConfPass').value = '';
}

function openClearDataModal() {
  openModal(`

      <p class="text-sm text-muted mb-6">Esta acción eliminará TODOS los datos de la aplicación: productos, ventas, gastos, billeteras y más. No se puede deshacer.</p>
      <p class="text-sm font-medium text-red-600 mb-6">Escribe <strong>ELIMINAR</strong> para confirmar:</p>
      <input id="clearConfirmInput" type="text" placeholder="ELIMINAR" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm mb-4 text-center">
      <div class="flex gap-2">
        <button onclick="closeModal()" class="btn flex-1 justify-center py-2.5 text-sm bg-gray-100 text-gray-700 hover:bg-gray-200">Cancelar</button>
        <button onclick="confirmClearData()" class="btn flex-1 justify-center py-2.5 text-sm bg-danger text-white hover:bg-red-600">Borrar Todo</button>
      </div>
    </div>`, 'max-w-sm');
}

function confirmClearData() {
  const input = $('#clearConfirmInput').value.trim();
  if (input !== 'ELIMINAR') { showToast('Escribe ELIMINAR para confirmar', 'warning'); return; }

  // Clear all sw_ keys
  const keysToRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('sw_')) keysToRemove.push(key);
  }
  keysToRemove.forEach(k => localStorage.removeItem(k));

  closeModal();
  showToast('Todos los datos han sido eliminados');
  doLogout();
}
